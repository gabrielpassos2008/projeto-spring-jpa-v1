<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/css/style.css}" rel="stylesheet" />
    <title>Document</title>
</head>

<body>
    <div class="container">
        <div class="menu">
            <a th:href="@{/}">Dashboard</a>
            <a th:href="@{/historico}" class="ativo">Histórico </a>
            <a th:href="@{/perfil}">Perfil</a>
        </div>


        <div class="lista-clientes">
            <div class="container-boas-vindas">
                <h1 class="titulo-boas-vindas">
                    Histórico de <span>Transações</span>
                </h1>
                <p class="subtitulo-boas-vindas">
                    Acompanhe todos os lançamentos e pagamentos realizados
                </p>
            </div>
            <div class="card-historico">
                <h2 class="tituloCard">Total a pagar: <span class="tituloCard"
                        th:text="${totalDivida != 0 ? 'R$ ' + totalDivida : 'Você não esta devendo'}"></span></h2>
            </div>
            <div class="card-historico" th:each="divida : ${dividas}">
                <div class="info-cliente">
                    <span class="valor">R$ <span th:text="${divida.valor}"></span></span>
                    <span class="valor">Data: <span
                            th:text="${#temporals.format(divida.data, 'dd/MM/yyyy HH:mm')}"></span></span>
                    <span class="valor">Status: <span th:text="${divida.status}"
                            th:class="${divida.status == 'PAGO' ? 'abatimento' : 'divida'}">PAGO</span></span>
                </div>
            </div>
        </div>
        <a th:href="@{/}" class="btn-voltar">voltar</a>

    </div>
</body>

</html>
