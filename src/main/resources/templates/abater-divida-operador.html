<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Caderninho</title>
<link rel="stylesheet" href="style.css">

<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

<div class="container">

    <!-- MENU -->
    <div class="menu">
        <a class="ativo" href="pesquisar.html">Cadastrar a divida</a>
        <a  href="cadastrarCliente.html">Cadastrar cliente</a>
        <a  href="perfil.html">Perfil</a>
    </div>

    <div class="conteudo">

        <!-- LADO ESQUERDO -->
        <div class="resumo">

            <h2 class="tituloForm">Resumo divida:</h2>

            <div class="card">
                <i class="bi bi-cash-stack"></i>
                <div>
                    <p>Total em dívidas</p>
                    <h3>R$ 1200,00</h3>
                </div>
            </div>

            <div class="card">
                <i class="bi bi-check-circle verde"></i>
                <div>
                    <p>Total pago no mês</p>
                    <h3>R$ 3.200,00</h3>
                </div>
            </div>

            <div class="card">
                <i class="bi bi-people azul"></i>
                <div>
                    <p>Clientes devendo</p>
                    <h3>23 clientes</h3>
                </div>
            </div>

        </div>


        <!-- FORMULARIO -->
        <div class="formDividido">

            <h2 class="tituloForm">Abater uma divida para: roberto</h2>

            <form>


                <label>Valor:</label>
                <input type="number">
                <button class="button" type="submit">Salvar</button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
