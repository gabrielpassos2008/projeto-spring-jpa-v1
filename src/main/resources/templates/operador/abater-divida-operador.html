<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Caderninho</title>
<link th:href="@{/css/style.css}" rel="stylesheet" />
<!-- Bootstrap Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>

<body>

<div class="container">

    <!-- MENU -->
    <div class="menu">
        <a  th:href="@{/adm/pesquisar-usuario}" class="ativo" >Cadastrar a divida</a>
        <a  th:href="@{/adm/cadastrar-cliente}">Cadastrar cliente</a>
        <a  th:href="@{/adm/perfil}">Perfil</a>
    </div>

    <div class="conteudo">

        <!-- LADO ESQUERDO -->
        <div class="resumo">

            <h2 class="tituloForm">Resumo divida: <span th:text="${cliente.nome}"></span></h2>

            <div class="card">
                <i class="bi bi-cash-stack"></i>
                <div>
                    <p>Total em dívidas:</p>
                    <h3 th:text="${'R$ '+totalPendente}"></h3>
                </div>
            </div>

            <div class="card">
                <i class="bi bi-check-circle verde"></i>
                <div>
                    <p>Total pago: </p>
                    <h3 th:text="${ 'R$ '+totalPago}"  ></h3>
                </div>
            </div>
        </div>


        <!-- FORMULARIO -->
        <div class="formDividido" >

            <h2 class="tituloForm">Abater uma divida para: <span th:text="${cliente.nome}"></span></h2>

            <form method="post" th:action="@{'/adm/abater-divida/'+${cliente.id}}">
                <label>Valor:</label>
                <input type="number" name="valor">
                <button class="button" type="submit">Salvar</button>
            </form>

        </div>

    </div>

</div>

</body>
</html>
