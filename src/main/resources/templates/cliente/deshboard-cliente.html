<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/css/style.css}" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <title>Document</title>
</head>

<body>
    <div class="container">
        <div class="menu">
            <a th:href="@{/}" class="ativo">Dashboard</a>
            <a th:href="@{/historico}">Histórico </a>
            <a th:href="@{/perfil}">Perfil</a>
        </div>
        <div class="container-boas-vindas">
            <h1 class="titulo-boas-vindas">
                Olá, <span th:text="${cliente.apelido}"></span>
            </h1>
            <p class="subtitulo-boas-vindas">
                Veja como estão suas finanças hoje
            </p>
        </div>

        <div class="resumo formCentralizado">

            <h2 class="tituloForm">Resumo divida</h2>

            <div class="card">
                <i class="bi bi-cash-stack"></i>
                <div class="card-valor">
                    <p>Total em dívidas:</p>
                    <h3 th:text="${'R$ '+totalDivida}"> R$ 100</h3>
                </div>
            </div>

            <div class="card">
                <i class="bi bi-check-circle verde"></i>
                <div>
                    <p>Total pago: </p>
                    <h3 th:text="${ 'R$ '+totalPago}">R$ 100</h3>
                </div>
            </div>
            <div class="mensagem sucesso" th:if="${sucesso}">
                <p th:text="${sucesso}"></p>
            </div>
        </div>

    </div>
</body>

</html>
