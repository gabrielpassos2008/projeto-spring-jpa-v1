<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link th:href="@{/css/style.css}" rel="stylesheet" />
</head>

<body>

    <div class="container">
        <div class="menu">
            <a th:href="@{/}">Dashboard</a>
            <a th:href="@{/historico}">Histórico </a>
            <a th:href="@{/perfil}" class="ativo">Perfil</a>
        </div>

        <div class="formCentralizado">

            <h2 class="tituloForm">Perfil</h2>

            <form method="post" th:action="@{/perfil/editar}" th:object="${cliente}">

                <label>Nome:</label>
                <input type="text" th:field="*{apelido}" placeholder="Nome (2–70 caracteres)">
            
                <label>Telefone:</label>
                <input type="text" th:field="*{telefone}" placeholder="Telefone (10–15 dígitos)">
            
                <label>Email:</label>
                <input type="text" th:field="*{email}" placeholder="Email (5–120 caracteres)">
            
                <label>Senha:</label>
                <input type="text" th:field="*{senha}" placeholder="Senha (8–64 caracteres)">

                <div class="mensagem erro" th:if="${mensagemErro}">
                    <ul>
                        <li th:each="erro : ${mensagemErro}" th:text="${erro}"></li>
                    </ul>
                </div>
                <button class="button" type="submit">Salvar</button>

            </form>

        </div>
    </div>


</body>

</html>
