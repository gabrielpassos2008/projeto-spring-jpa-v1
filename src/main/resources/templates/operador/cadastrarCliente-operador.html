<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link th:href="@{/css/style.css}" rel="stylesheet" />
</head>

<body>
    <div class="container">
        <div class="menu">
            <a th:href="@{/adm/pesquisar-usuario}">Cadastrar a divida</a>
            <a th:href="@{/adm/cadastrar-cliente}" class="ativo">Cadastrar cliente</a>
            <a th:href="@{/adm/perfil}">Perfil</a>
        </div>

        <div class="formCentralizado">

            <h2 class="tituloForm">Cadastrar cliente</h2>

            <form method="post" th:action="@{/adm/cadastrar-cliente}">

                <label>Nome:</label>
                <input type="text" name="nome" placeholder="Nome (2–70 caracteres)">

                <label>Apelido:</label>
                <input type="text" name="apelido" placeholder="Apelido (2–70 caracteres) ">

                <label>Telefone:</label>
                <input type="text" name="telefone" placeholder="Telefone (10–15 dígitos)">

                <label>Email:</label>
                <input type="text" name="email" placeholder="Email (5–120 caracteres)">

                <label>Senha:</label>
                <input type="password" name="senha" placeholder="Senha (8–64 caracteres)">

                <button class="button" type="submit">Cadastrar</button>
                <div class="mensagem erro" th:if="${mensagemErro}">
                    <p th:each="erro : ${mensagemErro}" th:text="${erro}"></p>
                </div>
            </form>

        </div>
    </div>
    <script th:if="${mensagemErro}">
        setTimeout(() => {
            window.location.href = "/adm/cadastrar-cliente";
        }, 10000);
    </script>
</body>

</html>
